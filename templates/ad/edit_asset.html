{% load static %}
<!DOCTYPE html>
<html>
<head>

    <title>Edit Asset</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="bg-light">

<div class="container py-5">

    <a href="{% url 'upload_asset' %}"
       class="btn btn-dark mb-4">

        <i class="fa fa-arrow-left"></i>
        Back

    </a>

    <div class="card shadow">

        <div class="card-header bg-warning">

            <h3>

                <i class="fa fa-edit"></i>

                Edit Asset

            </h3>

        </div>

        <div class="card-body">

            <form method="POST"
                  enctype="multipart/form-data">

                {% csrf_token %}

                <div class="row">

                    <!-- Asset Type -->
                    <div class="col-md-6 mb-3">

                        <label>Asset Type</label>

                        <select name="asset_type"
                                class="form-control">

                            <option value="template"
                                {% if asset.asset_type == 'template' %}
                                selected
                                {% endif %}>
                                Template
                            </option>

                            <option value="video"
                                {% if asset.asset_type == 'video' %}
                                selected
                                {% endif %}>
                                Video
                            </option>

                            <option value="motion"
                                {% if asset.asset_type == 'motion' %}
                                selected
                                {% endif %}>
                                Motion Graphics
                            </option>

                        </select>

                    </div>

                    <!-- Title -->
                    <div class="col-md-6 mb-3">

                        <label>Title</label>

                        <input type="text"
                               name="title"
                               value="{{ asset.title }}"
                               class="form-control"
                               required>

                    </div>

                    <!-- Category -->
                    <div class="col-md-6 mb-3">

                        <label>Category</label>

                        <input type="text"
                               name="category"
                               value="{{ asset.category }}"
                               class="form-control">

                    </div>

                    <!-- Price -->
                    <div class="col-md-6 mb-3">

                        <label>Price</label>

                        <input type="number"
                               name="price"
                               value="{{ asset.price }}"
                               class="form-control">

                    </div>

                    <!-- Rating -->
                    <div class="col-md-4 mb-3">

                        <label>Rating</label>

                        <input type="number"
                               step="0.1"
                               name="rating"
                               value="{{ asset.rating }}"
                               class="form-control">

                    </div>

                    <!-- Downloads -->
                    <div class="col-md-4 mb-3">

                        <label>Downloads</label>

                        <input type="number"
                               name="downloads"
                               value="{{ asset.downloads }}"
                               class="form-control">

                    </div>

                    <!-- Badge -->
                    <div class="col-md-4 mb-3">

                        <label>Badge</label>

                        <input type="text"
                               name="badge"
                               value="{{ asset.badge }}"
                               class="form-control">

                    </div>

                    <!-- Description -->
                    <div class="col-md-12 mb-3">

                        <label>Description</label>

                        <textarea name="description"
                                  rows="4"
                                  class="form-control">{{ asset.description }}</textarea>

                    </div>

                    <!-- Thumbnail -->
                    <div class="col-md-4 mb-3">

                        <label>Thumbnail</label>

                        <input type="file"
                               name="thumbnail"
                               class="form-control">

                        {% if asset.thumbnail %}

                        <img src="{{ asset.thumbnail.url }}"
                             width="120"
                             class="mt-2">

                        {% endif %}

                    </div>

                    <!-- Preview Video -->
                    <div class="col-md-4 mb-3">

                        <label>Preview Video</label>

                        <input type="file"
                               name="preview_video"
                               class="form-control">

                        {% if asset.preview_video %}

                        <video width="150"
                               controls
                               class="mt-2">

                            <source src="{{ asset.preview_video.url }}">

                        </video>

                        {% endif %}

                    </div>

                    <!-- ZIP -->
                    <div class="col-md-4 mb-3">

                        <label>ZIP File</label>

                        <input type="file"
                               name="zip_file"
                               class="form-control">

                        {% if asset.zip_file %}

                        <a href="{{ asset.zip_file.url }}"
                           class="btn btn-primary btn-sm mt-2">

                            Current ZIP

                        </a>

                        {% endif %}

                    </div>

                </div>

                <button type="submit"
                        class="btn btn-success w-100">

                    <i class="fa fa-save"></i>

                    Update Asset

                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
