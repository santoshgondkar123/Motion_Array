<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Dashboard</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts - Inter for professional look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        
        /* Professional card styling */
        .login-card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
        }
        
        .login-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 30px 55px -15px rgba(0, 0, 0, 0.3);
        }
        
        /* Form inner padding */
        .login-form {
            padding: 2rem 2rem 2.2rem 2rem;
        }
        
        /* Icon circle */
        .icon-circle {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem auto;
        }
        
        .icon-circle i {
            font-size: 2rem;
            color: white;
        }
        
        /* Headings */
        .login-title {
            font-weight: 700;
            font-size: 1.8rem;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        
        .login-subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 1.8rem;
        }
        
        /* Form labels */
        .form-label {
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            color: #475569;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-label i {
            color: #667eea;
            font-size: 0.85rem;
        }
        
        /* Input fields - professional clean */
        .form-control {
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1e293b;
            background: #ffffff;
            transition: all 0.2s;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            outline: none;
        }
        
        .form-control::placeholder {
            color: #94a3b8;
            font-weight: 400;
            font-size: 0.9rem;
        }
        
        /* Forgot password link */
        .forgot-link {
            color: #667eea;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .forgot-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        /* Login button */
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 40px;
            padding: 0.85rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #5a67d8 0%, #6b46a0 100%);
        }
        
        .btn-login:active {
            transform: translateY(1px);
        }
        
        /* Divider or footer (optional clean look) */
        .secure-badge {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        @media (max-width: 480px) {
            .login-form {
                padding: 1.5rem;
            }
            .login-title {
                font-size: 1.5rem;
            }
            .icon-circle {
                width: 55px;
                height: 55px;
            }
            .icon-circle i {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-form">
        
        <!-- Professional Icon & Header -->
        <div class="text-center">
            <div class="icon-circle">
                <i class="fas fa-user-shield"></i>
            </div>
            <h2 class="login-title">Admin Login</h2>
        </div>
        
        <!-- Form - ALL ORIGINAL FIELDS, NAMES, ATTRIBUTES KEPT IDENTICAL -->
        <form method="POST">
            {% csrf_token %}
            
            <!-- Username Field -->
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-user"></i> Username
                </label>
                <input type="text"
                       name="username"
                       class="form-control form-control-lg"
                       placeholder="Enter Admin Username"
                       required>
            </div>
            
            <!-- Password Field -->
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-lock"></i> Password
                </label>
                <input type="password"
                       name="password"
                       class="form-control form-control-lg"
                       placeholder="Enter Password"
                       required>
            </div>
            
            <!-- Submit Button (original class and text preserved) -->
            <button type="submit" class="btn btn-login w-100">
                <i class="fas fa-sign-in-alt me-2"></i> Admin Login
            </button>
            
            <!-- Optional professional security note (purely visual, no functionality) -->
            
        </form>
    </div>
</div>

<!-- Bootstrap JS (optional, for any future enhancements - no functional overrides) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Simple non-intrusive script - only logs, preserves original form behavior -->
<script>
    (function() {
        const form = document.querySelector('form');
        if (!form) return;
        
        form.addEventListener('submit', function(e) {
            // Do NOT prevent default - original Django functionality remains intact
            console.group('🔐 Admin Login Form Submission');
            const username = form.querySelector('input[name="username"]')?.value || '';
            console.log(`  Username: ${username}`);
            console.log('  Password: [hidden for security]');
            console.log('✅ Form validation passed — backend will process');
            console.groupEnd();
        });
        
        // Optional: simple placeholder animation (cosmetic only)
        const inputs = document.querySelectorAll('.form-control');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement?.classList.add('focused');
            });
            input.addEventListener('blur', function() {
                this.parentElement?.classList.remove('focused');
            });
        });
    })();
</script>

</body>
</html>
