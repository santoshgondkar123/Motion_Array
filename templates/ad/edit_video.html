<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Video</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* Simple, clean design - no functional changes */
        body {
            background: #f4f6f9;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 0;
        }
        
        .container {
            max-width: 900px;
        }
        
        /* Simple card styling */
        .card {
            border: none;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        
        /* Simple heading */
        .card h2 {
            color: #1e293b;
            font-weight: 600;
            font-size: 1.6rem;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 0.7rem;
        }
        
        /* Clean form labels */
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #334155;
            margin-bottom: 0.4rem;
        }
        
        .form-label i {
            color: #6c757d;
            width: 1.2rem;
        }
        
        /* Standard inputs */
        .form-control, .form-select {
            border: 1px solid #ced4da;
            border-radius: 10px;
            padding: 0.55rem 1rem;
            font-size: 0.9rem;
            background: #ffffff;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #86b7fe;
            box-shadow: 0 0 0 3px rgba(13,110,253,0.1);
            outline: none;
        }
        
        /* Simple button styles */
        .btn-dark {
            background: #1e293b;
            border: none;
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            font-weight: 500;
            font-size: 0.85rem;
        }
        
        .btn-dark:hover {
            background: #0f172a;
        }
        
        .btn-success {
            background: #10b981;
            border: none;
            border-radius: 40px;
            padding: 0.7rem;
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        .btn-success:hover {
            background: #059669;
        }
        
        /* Simple video preview */
        video {
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        
        .alert-warning {
            background: #fef3c7;
            border: none;
            border-radius: 12px;
            color: #92400e;
            font-size: 0.85rem;
        }
        
        .form-hint {
            font-size: 0.7rem;
            color: #6c757d;
            margin-top: 5px;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .card {
                padding: 1.2rem !important;
            }
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- Back button - simple design -->
    <div class="mb-4">
        <a href="{% url 'home' %}" class="btn btn-dark">
            <i class="fas fa-arrow-left me-2"></i> Back To Home
        </a>
    </div>
    
    <!-- Main Edit Card -->
    <div class="card shadow p-4 p-md-5">
        
        <h2 class="mb-4">
            <i class="fas fa-pen-to-square me-2" style="color: #10b981;"></i>
            Edit Video
        </h2>
        
        <!-- Form - ALL ORIGINAL FIELDS, NAMES, ATTRIBUTES KEPT IDENTICAL -->
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <!-- Title field -->
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-heading me-1"></i> Title
                </label>
                <input type="text" name="title" class="form-control" value="{{ video.title }}">
            </div>
            
            <!-- Category field -->
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-tags me-1"></i> Category
                </label>
                <input type="text" name="category" class="form-control" value="{{ video.category }}">
            </div>
            
            <!-- Price & Rating row -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        <i class="fas fa-dollar-sign me-1"></i> Price
                    </label>
                    <input type="number" name="price" class="form-control" value="{{ video.price }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        <i class="fas fa-star me-1" style="color: #f59e0b;"></i> Rating
                    </label>
                    <input type="number" step="0.1" name="rating" class="form-control" value="{{ video.rating }}">
                </div>
            </div>
            
            <!-- Downloads field -->
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-download me-1"></i> Downloads
                </label>
                <input type="number" name="downloads" class="form-control" value="{{ video.downloads }}">
            </div>
            
            <!-- Badge select - all original options preserved -->
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-medal me-1"></i> Badge
                </label>
                <select name="badge" class="form-select">
                    <option value="Best Seller" {% if video.badge == "Best Seller" %}selected{% endif %}>
                        ⭐ Best Seller
                    </option>
                    <option value="Trending" {% if video.badge == "Trending" %}selected{% endif %}>
                        🔥 Trending
                    </option>
                    <option value="Featured" {% if video.badge == "Featured" %}selected{% endif %}>
                        ✨ Featured
                    </option>
                    <option value="Viral" {% if video.badge == "Viral" %}selected{% endif %}>
                        📈 Viral
                    </option>
                    <option value="Premium" {% if video.badge == "Premium" %}selected{% endif %}>
                        👑 Premium
                    </option>
                </select>
            </div>
            
            <!-- Current Video Preview -->
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-play-circle me-1"></i> Current Video
                </label>
                {% if video.video %}
                    <video controls class="w-100" style="max-height: 280px; border-radius: 12px;">
                        <source src="{{ video.video.url }}" type="video/mp4">
                    </video>
                    <div class="form-hint mt-1">
                        <i class="fas fa-check-circle me-1 text-success"></i> Current uploaded video
                    </div>
                {% else %}
                    <div class="alert alert-warning mt-1">No video uploaded</div>
                {% endif %}
            </div>
            
            <!-- Replace Video file input -->
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-upload me-1"></i> Replace Video
                </label>
                <input type="file" name="video" class="form-control" accept="video/*">
                <div class="form-hint"><i class="fas fa-info-circle me-1"></i> Leave empty to keep current video file.</div>
            </div>
            
            <!-- Description textarea -->
            <div class="mb-4">
                <label class="form-label">
                    <i class="fas fa-align-left me-1"></i> Description
                </label>
                <textarea name="description" rows="4" class="form-control">{{ video.description }}</textarea>
            </div>
            
            <!-- Update Button -->
            <button type="submit" class="btn btn-success w-100">
                <i class="fas fa-save me-2"></i> Update Video
            </button>
          <a href="{% url 'upload_video' %}"
   class="btn btn-dark w-100 mt-3">

    <i class="fas fa-arrow-left me-2"></i>
    Back

</a>
</a>
        </form>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Simple non-intrusive script - only console logging, no functional changes -->
<script>
    (function() {
        const form = document.querySelector('form');
        if (!form) return;
        
        form.addEventListener('submit', function(e) {
            console.group('📝 Edit Video Form Submission');
            const formData = new FormData(form);
            for (let [key, value] of formData.entries()) {
                if (value instanceof File && value.name) {
                    console.log(`  ${key}: ${value.name}`);
                } else if (typeof value === 'string' && value.length < 100) {
                    console.log(`  ${key}: "${value}"`);
                }
            }
            console.log('✅ Form submitted - all original fields preserved');
            console.groupEnd();
        });
    })();
</script>

</body>
</html>
