<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Browse All Templates | Motion Studio</title>
    <!-- Google Font + Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }

        /* main container – no header, no footer */
        .browse-container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 40px 32px 80px 32px;
        }

        /* header section (page title + intro, but not navbar) */
        .page-header {
            margin-bottom: 48px;
            text-align: center;
        }

        .page-header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0f2b3d, #2c5f8a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }

        .page-header p {
            color: #475569;
            margin-top: 12px;
            font-size: 1.1rem;
        }

        /* search & filter bar */
        .toolbar {
            background: white;
            border-radius: 80px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 8px 8px 8px 28px;
            margin-bottom: 40px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.02), 0 1px 3px rgba(0,0,0,0.03);
            border: 1px solid #e9edf2;
        }

        .search-box {
            flex: 2;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 240px;
        }

        .search-box i {
            color: #8ba0bc;
            font-size: 1.1rem;
        }

        .search-box input {
            border: none;
            padding: 14px 0;
            font-size: 1rem;
            width: 100%;
            background: transparent;
            outline: none;
            font-family: inherit;
        }

        .filter-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: none;
            padding: 10px 20px;
            font-weight: 500;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            color: #334155;
        }

        .filter-btn.active {
            background: #0f2b3d;
            color: white;
        }

        .filter-btn:hover:not(.active) {
            background: #eef2ff;
        }

        /* stats row */
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .results-count {
            font-weight: 500;
            color: #2c3e66;
        }

        .sort-select {
            border: 1px solid #e2e8f0;
            padding: 8px 16px;
            border-radius: 32px;
            background: white;
            font-family: inherit;
            font-size: 0.85rem;
        }

        /* TEMPLATES GRID (clean, professional, responsive) */
        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 28px;
            margin-bottom: 56px;
        }

        .template-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.25s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #edf2f7;
        }

        .template-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 36px -16px rgba(0,0,0,0.12);
            border-color: #dce5ef;
        }

        .card-media {
            position: relative;
            background: #111827;
            height: 190px;
            overflow: hidden;
        }

        .card-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .template-card:hover .card-media video {
            transform: scale(1.02);
        }

        .media-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 30px;
            letter-spacing: 0.3px;
        }

        .price-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: #ffffffdd;
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #0f172a;
        }

        .card-content {
            padding: 18px;
        }

        .card-category {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #5b6e8c;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .card-content h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .card-meta {
            display: flex;
            gap: 16px;
            font-size: 0.75rem;
            color: #62748c;
            margin-bottom: 16px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f0f2f5;
            padding-top: 14px;
        }

        .btn-preview {
            background: none;
            border: 1px solid #dce3ec;
            padding: 6px 16px;
            border-radius: 32px;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-preview:hover {
            background: #f1f5f9;
            border-color: #9aaebf;
        }

        .license-type {
            font-size: 0.7rem;
            color: #4b6b8f;
        }

        /* pagination (simple) */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .page-link {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            background: white;
            border: 1px solid #e2e8f0;
            font-weight: 500;
            transition: 0.2s;
            cursor: pointer;
        }

        .page-link.active-page {
            background: #0f2b3d;
            color: white;
            border-color: #0f2b3d;
        }

        @media (max-width: 700px) {
            .browse-container { padding: 24px 20px 60px; }
            .toolbar { flex-direction: column; align-items: stretch; border-radius: 28px; padding: 16px; gap: 12px; }
            .filter-group { justify-content: center; }
            .page-header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="browse-container">
    <!-- simple header (not a navbar, just page identity) -->
    <div class="page-header">
        <h1>Motion Assets <span style="background: linear-gradient(135deg,#2c5f8a,#0f2b3d); background-clip:text; -webkit-background-clip:text; color:transparent;">Library</span></h1>
        <p>Professional templates, stock video & motion graphics — curated for creators</p>
    </div>

    <!-- search + filters (no navbar) -->
    <div class="toolbar">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search by keyword, title, or category...">
        </div>
        <div class="filter-group" id="filterGroup">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="ae">After Effects</button>
            <button class="filter-btn" data-filter="pr">Premiere Pro</button>
            <button class="filter-btn" data-filter="mg">Motion Graphics</button>
            <button class="filter-btn" data-filter="stock">Stock Video</button>
        </div>
    </div>

    <div class="stats-row">
        <div class="results-count" id="resultCount">Showing 12 templates</div>
        <select class="sort-select" id="sortSelect">
            <option value="default">Most relevant</option>
            <option value="popular">Most popular</option>
            <option value="newest">Newest</option>
            <option value="price-low">Price: Low to High</option>
        </select>
    </div>

    <!-- DYNAMIC GRID (full data) -->
    <div class="templates-grid" id="templatesGrid"></div>

    <!-- pagination (ui only, fully functional) -->
    <div class="pagination" id="paginationControls">
        <!-- dynamic pagination buttons -->
    </div>
</div>

<script>
    // ----- PROFESSIONAL TEMPLATES DATABASE -----
    const templatesData = [
        { id: 1, title: "Cyber Glitch Logo Reveal", category: "ae", categoryLabel: "After Effects", price: 29, downloads: 2840, rating: 4.9, date: "2025-02-10", videoSrc: "https://assets.mixkit.co/videos/preview/mixkit-abstract-animation-of-futuristic-technology-35614-large.mp4", badge: "Trending" },
        { id: 2, title: "Modern Slideshow Opener", category: "pr", categoryLabel: "Premiere Pro", price: 39, downloads: 1820, rating: 4.8, date: "2025-01-18", videoSrc: "https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-world-map-35187-large.mp4", badge: "Best Seller" },
        { id: 3, title: "Abstract Kinetic Shapes", category: "mg", categoryLabel: "Motion Graphics", price: 49, downloads: 3120, rating: 5.0, date: "2025-02-01", videoSrc: "https://assets.mixkit.co/videos/preview/mixkit-abstract-animation-of-geometric-shapes-35611-large.mp4", badge: "New" },
        { id: 4, title: "Aerial Drone Shots - Coastal", category: "stock", categoryLabel: "Stock Video", price: 19, downloads: 4530, rating: 4.7, date: "2025-01-05", videoSrc: "https://assets.mixkit.co/videos/preview/mixkit-smooth-drone-shot-of-a-pier-2991-large.mp4", badge: "4K" },
        { id: 5, title: "HUD Sci-Fi Interface", category: "ae", categoryLabel: "After Effects", price: 59, downloads: 5200, rating: 4.9, date: "2025-02-14", videoSrc: "https://assets.mixkit.co/videos/preview/mixkit-abstract-animation-of-lines-and-dots-35607-large.mp4", badge: "Editors' pick" },
        { id: 6, title: "Vibrant Promo Toolkit", category: "pr", categoryLabel: "Premiere Pro", price: 34, downloads: 2100, rating: 4.8, date: "2025-01-22", videoSrc: "https://assets.mixkit.co/videos/preview/mixkit-colorful-animation-of-shapes-35603-large.mp4", badge: "" },
        { id: 7, title: "Kinetic Typography Pack", category: "mg", categoryLabel: "Motion Graphics", price: 45, downloads: 1870, rating: 4.9, date: "2025-02-09", videoSrc: "https://assets.mixkit.co/videos/preview/mixkit-abstract-animation-of-futuristic-technology-35614-large.mp4", badge: "Popular" },
        { id: 8, title: "Cinematic LUTS + Overlays", category: "stock", categoryLabel: "Stock Video", price: 24, downloads: 3290, rating: 4.6, date: "2025-01-30", videoSrc: "https://assets.mixkit.co/videos/preview/mixkit-smooth-drone-shot-of-a-pier-2991-large.mp4", badge: "" },
        { id: 9, title: "Glitch Transitions", category: "ae", categoryLabel: "After Effects", price: 27, downloads: 2700, rating: 4.8, date: "2025-02-12", videoSrc: "https://assets.mixkit.co/videos/preview/mixkit-abstract-animation-of-lines-and-dots-35607-large.mp4", badge: "Sale" },
        { id: 10, title: "Social Media Stories Pack", category: "pr", categoryLabel: "Premiere Pro", price: 32, downloads: 1980, rating: 4.7, date: "2025-02-05", videoSrc: "https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-world-map-35187-large.mp4", badge: "Trending" },
        { id: 11, title: "3D Abstract Loops", category: "mg", categoryLabel: "Motion Graphics", price: 55, downloads: 1440, rating: 4.9, date: "2025-02-16", videoSrc: "https://assets.mixkit.co/videos/preview/mixkit-abstract-animation-of-geometric-shapes-35611-large.mp4", badge: "New" },
        { id: 12, title: "Corporate Presentation Scenes", category: "ae", categoryLabel: "After Effects", price: 49, downloads: 3620, rating: 4.8, date: "2025-01-28", videoSrc: "https://assets.mixkit.co/videos/preview/mixkit-abstract-animation-of-futuristic-technology-35614-large.mp4", badge: "Business" },
        { id: 13, title: "Urban Timelapse - Stock", category: "stock", categoryLabel: "Stock Video", price: 21, downloads: 2850, rating: 4.7, date: "2025-02-03", videoSrc: "https://assets.mixkit.co/videos/preview/mixkit-smooth-drone-shot-of-a-pier-2991-large.mp4", badge: "4K" },
        { id: 14, title: "Broadcast Package", category: "pr", categoryLabel: "Premiere Pro", price: 69, downloads: 970, rating: 4.9, date: "2025-02-11", videoSrc: "https://assets.mixkit.co/videos/preview/mixkit-colorful-animation-of-shapes-35603-large.mp4", badge: "Pro" }
    ];

    let currentPage = 1;
    const itemsPerPage = 9;
    let currentFilter = "all";
    let currentSearch = "";
    let currentSort = "default";

    // helper: filter & search
    function filterAndSearchData() {
        let filtered = [...templatesData];
        if (currentFilter !== "all") {
            filtered = filtered.filter(item => item.category === currentFilter);
        }
        if (currentSearch.trim() !== "") {
            const searchLower = currentSearch.toLowerCase();
            filtered = filtered.filter(item => item.title.toLowerCase().includes(searchLower) || item.categoryLabel.toLowerCase().includes(searchLower));
        }
        // sorting
        if (currentSort === "popular") filtered.sort((a,b) => b.downloads - a.downloads);
        else if (currentSort === "newest") filtered.sort((a,b) => new Date(b.date) - new Date(a.date));
        else if (currentSort === "price-low") filtered.sort((a,b) => a.price - b.price);
        else filtered.sort((a,b) => a.id - b.id); // default
        return filtered;
    }

    function renderGrid() {
        const filteredAll = filterAndSearchData();
        const totalItems = filteredAll.length;
        const totalPages = Math.ceil(totalItems / itemsPerPage);
        const start = (currentPage - 1) * itemsPerPage;
        const pageItems = filteredAll.slice(start, start + itemsPerPage);

        const gridContainer = document.getElementById("templatesGrid");
        if (!gridContainer) return;
        if (pageItems.length === 0) {
            gridContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px;">✨ No templates match your criteria. Try adjusting filters.</div>`;
            document.getElementById("resultCount").innerText = `Showing 0 results`;
            return;
        }
        let html = "";
        pageItems.forEach(item => {
            html += `
                <div class="template-card" data-cat="${item.category}">
                    <div class="card-media">
                        <video muted loop playsinline poster="">
                            <source src="${item.videoSrc}" type="video/mp4">
                        </video>
                        <div class="media-badge">${item.categoryLabel}</div>
                        <div class="price-badge">$${item.price}</div>
                        ${item.badge ? `<div class="media-badge" style="left:auto; right:12px; left:12px; top:12px; background:#000000aa;">${item.badge}</div>` : ''}
                    </div>
                    <div class="card-content">
                        <div class="card-category">${item.categoryLabel}</div>
                        <h3>${item.title}</h3>
                        <div class="card-meta">
                            <span><i class="fas fa-download"></i> ${item.downloads.toLocaleString()}</span>
                            <span><i class="fas fa-star"></i> ${item.rating}</span>
                        </div>
                        <div class="card-footer">
                            <span class="license-type">Royalty-free</span>
                            <button class="btn-preview" data-id="${item.id}">Preview <i class="fas fa-play-circle"></i></button>
                        </div>
                    </div>
                </div>
            `;
        });
        gridContainer.innerHTML = html;
        document.getElementById("resultCount").innerText = `Showing ${pageItems.length} of ${totalItems} templates`;

        // reattach video hover
        document.querySelectorAll('.template-card .card-media video').forEach(video => {
            const card = video.closest('.template-card');
            card.addEventListener('mouseenter', () => { video.play().catch(e=>{}); });
            card.addEventListener('mouseleave', () => { video.pause(); video.currentTime = 0; });
        });
        // preview click alert
        document.querySelectorAll('.btn-preview').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                alert("🎬 Preview window: full HD resolution & project file demo available.");
            });
        });
        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        const paginationDiv = document.getElementById("paginationControls");
        if (!paginationDiv) return;
        if (totalPages <= 1) {
            paginationDiv.innerHTML = "";
            return;
        }
        let pagesHtml = "";
        for (let i = 1; i <= Math.min(totalPages, 6); i++) {
            pagesHtml += `<div class="page-link ${i === currentPage ? 'active-page' : ''}" data-page="${i}">${i}</div>`;
        }
        if (totalPages > 6) pagesHtml += `<div class="page-link">...</div><div class="page-link" data-page="${totalPages}">${totalPages}</div>`;
        paginationDiv.innerHTML = pagesHtml;
        document.querySelectorAll('.page-link[data-page]').forEach(btn => {
            btn.addEventListener('click', () => {
                currentPage = parseInt(btn.getAttribute('data-page'));
                renderGrid();
                window.scrollTo({ top: 300, behavior: 'smooth' });
            });
        });
    }

    // event handlers for filters, search, sort
    function initEvents() {
        const filterButtons = document.querySelectorAll('.filter-btn');
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.getAttribute('data-filter');
                currentPage = 1;
                renderGrid();
            });
        });
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value;
            currentPage = 1;
            renderGrid();
        });
        const sortSelect = document.getElementById('sortSelect');
        sortSelect.addEventListener('change', (e) => {
            currentSort = e.target.value;
            currentPage = 1;
            renderGrid();
        });
    }

    renderGrid();
    initEvents();
</script>
</body>
</html>
