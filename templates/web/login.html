{%load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Elite Access • Secure Login</title>
    <!-- Font Awesome 6 (free icons) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">    <!-- SweetAlert2 for professional alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        /* make body relative to contain video overlay properly */
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* background video styling - fullscreen, fixed, covers area */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            
            filter: brightness(1.3) contrast(1.2) saturate(1.3);
            /* Ensures video plays smoothly and stays in background */
            pointer-events: none;
        }.video-overlay {
    display: none;
}

        /* fallback overlay in case video fails or offline - but keep original gradient vibe */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(56, 189, 248, 0.08), transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        /* additional solid dark overlay so text remains readable */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 10, 25, 0.55);
            z-index: -1;
            pointer-events: none;
        }

        /* main card container - stays above video */
        .auth-container {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 480px;
            padding: 2rem 1.8rem 2.2rem;
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;
        }

        /* header with toggle buttons */
        .form-header {
            display: flex;
            gap: 0.75rem;
            background: rgba(30, 41, 59, 0.6);
            padding: 0.5rem;
            border-radius: 3rem;
            margin-bottom: 2rem;
        }

        .toggle-btn {
            flex: 1;
            text-align: center;
            background: transparent;
            border: none;
            padding: 0.7rem 0;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.2s;
            color: #94a3b8;
            letter-spacing: 0.3px;
        }

        .toggle-btn.active {
           background: linear-gradient(135deg,#ff8c2f,#ff6b00);
            color: white;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }

        /* auth content wrapper */
        .auth-content {
            animation: fadeSlide 0.35s ease-out;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* social buttons row */
        .social-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem 0;
            border-radius: 2rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .social-btn i {
            font-size: 1.1rem;
        }

        .social-btn.google:hover {
            background: #ea4335;
            border-color: #ea4335;
            color: white;
            transform: translateY(-2px);
        }

        .social-btn.facebook:hover {
            background: #1877f2;
            border-color: #1877f2;
            color: white;
            transform: translateY(-2px);
        }

        /* divider OR */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #64748b;
            font-size: 0.75rem;
            font-weight: 500;
            margin: 1rem 0 1.5rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        /* form groups */
        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .form-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 1.25rem;
            padding: 0.85rem 1.2rem;
            font-size: 0.95rem;
            color: #f1f5f9;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: #3b82f6;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }

        .form-group input::placeholder {
            color: #64748b;
            font-weight: 400;
        }

        /* password toggle icon */
        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1rem;
        }

        .toggle-password:hover {
            color: #cbd5e1;
        }

        /* submit button */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg,#ff8c2f,#ff6b00);
            border: none;
            padding: 0.9rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.2);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
           box-shadow: 0 12px 25px rgba(255,140,47,.5);
        }

        /* extra footer / links */
        .form-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .demo-note {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            text-align: center;
            color: #5b6e8c;
            border: 1px dashed rgba(255,255,255,0.1);
        }

        .demo-note span {
            color: #60a5fa;
            font-weight: 500;
        }

        /* validation style */
        .error-shake {
            animation: shake 0.3s ease-in-out 0s 2;
            border-color: #ef4444 !important;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* responsive */
        @media (max-width: 480px) {
            .auth-container {
                padding: 1.5rem;
            }
            .social-btn {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

<!-- Background Video with offline fallback support & auto-reload -->
<!-- Note: 'video11.mp4' must exist in your static/video/ folder. For offline, browser will handle caching -->
<!-- Added playsinline autoplay muted loop to ensure seamless background, and preload metadata for better offline behavior -->
<video autoplay muted loop playsinline id="bg-video" preload="auto">
    <source src="{% static 'web/video/video21.mp4' %}" type="video/mp4">
    <!-- Optional fallback if video fails to load (just keep silent) -->
    Your browser does not support the video tag.
</video>

<!-- Extra overlay to improve text contrast but let video shine -->
<div class="video-overlay"></div>
 <div class="position-absolute top-0 start-0 m-4">

  <a href="/"
   class="btn rounded-pill px-4 fw-bold shadow text-white"
   style="background: linear-gradient(135deg,#ff8c2f,#ff6b00);
          border:none;">
    <i class="fas fa-arrow-left me-2"></i>
    Back to Home
</a>

</div>
<div class="auth-container">
   
    <!-- header toggle -->
     <div class="payment-container">


    <!-- Professional Plan Selector -->
    <div class="form-header">
        <button class="toggle-btn active" id="btnSignupTab">Sign up</button>
        <button class="toggle-btn" id="btnLoginTab">Log in</button>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupForm" class="auth-content">
        <!-- <div class="social-buttons">
            <button class="social-btn google" id="socialGoogleSignup">
                <i class="fab fa-google"></i> Google
            </button>
            <button class="social-btn facebook" id="socialFbSignup">
                <i class="fab fa-facebook-f"></i> Facebook
            </button>
        </div> -->
        <div class="divider">OR</div>
        <div class="form-group">
            <input type="text" id="signupFullname" placeholder="Full Name" autocomplete="name">
        </div>
        <div class="form-group">
            <input type="email" id="signupEmail" placeholder="Email Address" autocomplete="email">
        </div>
        <div class="form-group password-wrapper">
            <input type="password" id="signupPassword" placeholder="Password" autocomplete="new-password">
            <button type="button" class="toggle-password" data-target="signupPassword"><i class="far fa-eye-slash"></i></button>
        </div>
        <button type="button" class="submit-btn" id="createAccountBtn">Create Account</button>
        <div class="form-footer">
            By joining you agree to our <a href="#" style="color:#60a5fa; text-decoration: none;">Terms</a>
        </div>
    </div>

    <!-- LOGIN FORM (initially hidden) -->
    <div id="loginForm" class="auth-content" style="display:none;">
        
        <div class="divider">OR</div>
        <div class="form-group">
            <input type="email" id="loginEmail" placeholder="Email Address" autocomplete="email">
        </div>
        <div class="form-group password-wrapper">
            <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
            <button type="button" class="toggle-password" data-target="loginPassword"><i class="far fa-eye-slash"></i></button>
        </div>
        <button type="button" class="submit-btn" id="loginBtn">Login</button>
        <div class="form-footer">
    <a href="#"
       onclick="forgotPassword()"
       style="color:#60a5fa; text-decoration:none;">
       Forgot password?
    </a>
</div>
    </div>

 
</div>

<script>
    // ---------- DOM Elements ----------
    const signupDiv = document.getElementById('signupForm');
    const loginDiv = document.getElementById('loginForm');
    const signupTabBtn = document.getElementById('btnSignupTab');
    const loginTabBtn = document.getElementById('btnLoginTab');

    // Inputs signup
    const signupName = document.getElementById('signupFullname');
    const signupEmail = document.getElementById('signupEmail');
    const signupPassword = document.getElementById('signupPassword');
    const createBtn = document.getElementById('createAccountBtn');

    // Login inputs
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');

    // Social buttons references
    const socialGoogleSignup = document.getElementById('socialGoogleSignup');
    const socialFbSignup = document.getElementById('socialFbSignup');
    const socialGoogleLogin = document.getElementById('socialGoogleLogin');
    const socialFbLogin = document.getElementById('socialFbLogin');

    // Password toggles
    const toggleButtons = document.querySelectorAll('.toggle-password');

    // Background video robust handling: ensure it plays even if offline / cached
    const bgVideo = document.getElementById('bg-video');
    if (bgVideo) {
        // For better offline experience: if video fails to load, we keep everything working perfectly
        // No error alert, just silent fallback — original gradient remains.
        bgVideo.addEventListener('error', function(e) {
            console.log("Background video could not be loaded, but page works perfectly offline.");
            // Optional: hide video element? We can leave as is, gradient shows behind anyway.
            // No user disruption.
        });
        // Attempt to play programmatically to overcome autoplay restrictions in some browsers (but it's fine)
        bgVideo.play().catch(err => {
            console.log("Autoplay was prevented, but muted + playsinline should allow it.");
        });
    }

    // ---------- Helper Functions ----------
    function showSuccessAndRedirect(message) {
        Swal.fire({
            icon: 'success',
            title: message,
            text: 'Redirecting to Subscription Plans...',
            timer: 1800,
            showConfirmButton: false,
            background: '#0f172a',
            color: '#f8fafc'
        });

        setTimeout(() => {
            window.location.href = "/subscribe/?plan=yearly";
        }, 1800);
    }

    // generic validation (non-empty, email format, password min length)
    function validateEmail(email) {
        const re = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;
        return re.test(email);
    }

    function shakeElement(el) {
        if (!el) return;
        el.classList.add('error-shake');
        setTimeout(() => {
            el.classList.remove('error-shake');
        }, 500);
    }

    // Professional fake login / signup logic with validations
    function handleSignup() {
        const name = signupName.value.trim();
        const email = signupEmail.value.trim();
        const pwd = signupPassword.value.trim();

        if (!name) {
            Swal.fire({ icon: 'warning', title: 'Missing name', text: 'Please enter your full name.', background: '#0f172a', color: '#f8fafc' });
            shakeElement(signupName);
            return;
        }
        if (!email) {
            Swal.fire({ icon: 'warning', title: 'Email required', text: 'Please provide an email address.', background: '#0f172a', color: '#f8fafc' });
            shakeElement(signupEmail);
            return;
        }
        if (!validateEmail(email)) {
            Swal.fire({ icon: 'error', title: 'Invalid email', text: 'Use a valid format: name@example.com', background: '#0f172a', color: '#f8fafc' });
            shakeElement(signupEmail);
            return;
        }
        if (pwd.length < 4) {
            Swal.fire({ icon: 'error', title: 'Weak password', text: 'Password must be at least 4 characters.', background: '#0f172a', color: '#f8fafc' });
            shakeElement(signupPassword);
            return;
        }

        // professional simulation: account creation success
        showSuccessAndRedirect('Account created successfully!');
    }

    function handleLogin() {
        const email = loginEmail.value.trim();
        const pwd = loginPassword.value.trim();

        if (!email) {
            Swal.fire({ icon: 'warning', title: 'Email required', text: 'Enter your email address.', background: '#0f172a', color: '#f8fafc' });
            shakeElement(loginEmail);
            return;
        }
        if (!validateEmail(email)) {
            Swal.fire({ icon: 'error', title: 'Invalid email', text: 'Please enter a valid email address.', background: '#0f172a', color: '#f8fafc' });
            shakeElement(loginEmail);
            return;
        }
        if (pwd.length < 4) {
            Swal.fire({ icon: 'error', title: 'Invalid credentials', text: 'Password must be at least 4 characters.', background: '#0f172a', color: '#f8fafc' });
            shakeElement(loginPassword);
            return;
        }

        showSuccessAndRedirect('Welcome back!');
    }

    // social login for both forms (professional simulation)
    function socialLoginHandler(provider) {
        Swal.fire({
            icon: 'success',
            title: `${provider} connected`,
            text: `Authenticated successfully via ${provider}. Redirecting...`,
            timer: 1600,
            showConfirmButton: false,
            background: '#0f172a',
            color: '#f8fafc'
        });

        setTimeout(() => {
            window.location.href = "/subscribe/?plan=lifetime";
        }, 1600);
    }

    // ---------- Password visibility toggle ----------
    function initPasswordToggles() {
        toggleButtons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('data-target');
                const inputField = document.getElementById(targetId);
                if (inputField) {
                    const type = inputField.getAttribute('type') === 'password' ? 'text' : 'password';
                    inputField.setAttribute('type', type);
                    const icon = this.querySelector('i');
                    if (icon) {
                        icon.classList.toggle('fa-eye-slash');
                        icon.classList.toggle('fa-eye');
                    }
                }
            });
        });
    }

    // ---------- Switch between forms with smooth handling ----------
    function setActiveForm(isSignup) {
        if (isSignup) {
            signupDiv.style.display = 'block';
            loginDiv.style.display = 'none';
            signupTabBtn.classList.add('active');
            loginTabBtn.classList.remove('active');
        } else {
            signupDiv.style.display = 'none';
            loginDiv.style.display = 'block';
            loginTabBtn.classList.add('active');
            signupTabBtn.classList.remove('active');
        }
    }

    // ----- attach all event listeners with modern approach -----
    function bindEvents() {
        // tab toggling
        signupTabBtn.addEventListener('click', () => setActiveForm(true));
        loginTabBtn.addEventListener('click', () => setActiveForm(false));

        // submit actions
        createBtn.addEventListener('click', handleSignup);
        loginBtn.addEventListener('click', handleLogin);

        // social signup
        if (socialGoogleSignup) {
            socialGoogleSignup.addEventListener('click', () => socialLoginHandler('Google'));
            socialFbSignup.addEventListener('click', () => socialLoginHandler('Facebook'));
        }
        // social login
        if (socialGoogleLogin) {
            socialGoogleLogin.addEventListener('click', () => socialLoginHandler('Google'));
            socialFbLogin.addEventListener('click', () => socialLoginHandler('Facebook'));
        }

        // additional "enter key" support for better UX
        const signupInputs = [signupName, signupEmail, signupPassword];
        signupInputs.forEach(input => {
            if (input) {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') handleSignup();
                });
            }
        });

        const loginInputs = [loginEmail, loginPassword];
        loginInputs.forEach(input => {
            if (input) {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') handleLogin();
                });
            }
        });
    }

    // demo hint popup
    function optionalDemoHint() {
        const demoText = document.querySelector('.demo-note');
        if (demoText) {
            demoText.style.cursor = 'pointer';
            demoText.addEventListener('click', () => {
                Swal.fire({
                    icon: 'info',
                    title: 'Test credentials',
                    html: `<strong style="color:#93c5fd;">Signup:</strong> any email + pass (min 4 chars)<br/>
                           <strong style="color:#93c5fd;">Login demo:</strong> user@example.com / demo123`,
                    background: '#0f172a',
                    color: '#cbd5e6',
                    confirmButtonColor: '#3b82f6'
                });
            });
        }
    }

    // legacy fakeLogin compatibility (if any external call)
    window.fakeLogin = function() {
        const isSignupVisible = signupDiv.style.display !== 'none';
        if (isSignupVisible) {
            handleSignup();
        } else {
            handleLogin();
        }
    };

    // Initialize
    initPasswordToggles();
    bindEvents();
    setActiveForm(true);    // default: signup visible
    optionalDemoHint();

    // remove error shake on focus
    const allInputs = document.querySelectorAll('.form-group input');
    allInputs.forEach(input => {
        input.addEventListener('focus', () => {
            input.classList.remove('error-shake');
        });
    });
function forgotPassword() {
    Swal.fire({
        title: 'Reset Password',
        input: 'email',
        inputPlaceholder: 'Enter your email',
        confirmButtonText: 'Send Reset Link',
        showCancelButton: true
    }).then((result) => {
        if (result.isConfirmed) {
            Swal.fire(
                'Success',
                'Password reset link sent to ' + result.value,
                'success'
            );
        }
    });
}
    // Enhanced offline-friendly: handle video if source fails but no changes to logic
    // Also ensures no console errors break the core functionality
    // Since you requested "offline baki kai changes nko" - we made sure video presence doesn't affect login/signup core.
    // Additionally we keep the video element as is, using static tag, perfect for your django staticfiles.
    // If video is missing, everything remains visually appealing due to gradient overlay.
</script>
</body>
</html>
