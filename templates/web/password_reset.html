{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password • Secure Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons (enhances card design subtly) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ========== ONLY ADDITIONAL STYLES - NO CHANGES TO YOUR EXISTING CLASSES ========== */
        
        /* Make the row wider to accommodate image + form side by side */
        .custom-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
        
        /* Left side image column */
        .image-col {
            flex: 0 0 40%;
            max-width: 40%;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Right side form column (your original card) */
        .form-col {
            flex: 0 0 60%;
            max-width: 60%;
            padding: 25px;
        }
        
        /* Image styling */
       .reset-image{
    width:100%;
    max-width:300px;
    height:auto;
    border-radius:20px;
    object-fit:cover;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
        
        .reset-image:hover {
            transform: scale(1.02);
        }
        
        /* ========== ENHANCED CARD DESIGN - PREMIUM TOUCHES ========== */
        /* Your original .card class is preserved and enhanced with gradient border + subtle animation */
        .card {
            background: white;
            border-radius: 1.5rem !important;  /* smoother rounding */
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
        }
        
        /* Premium gradient border effect (does not affect any existing functionality) */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ff8c2f, #ff6b00, #ffaa44, #ff8c2f);
            background-size: 200% 100%;
            animation: shimmer 3s infinite linear;
            z-index: 1;
        }
        
        @keyframes shimmer {
            0% { background-position: 0% 0; }
            100% { background-position: 200% 0; }
        }
        
        /* Enhanced card shadow on hover */
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, 0.2) !important;
        }
        
        /* More premium heading style with gradient text */
        .card-body h2 {
            background: linear-gradient(135deg, #2c3e66, #ff6b00);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        
        /* enhanced button styling - keeps btn-warning but adds premium effects */
        .btn-warning {
            background: linear-gradient(95deg, #ff8c2f, #ff6b00);
            border: none;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 3rem !important;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
            color: white;
            box-shadow: 0 8px 18px rgba(255, 107, 0, 0.25);
        }
        
        .btn-warning:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
            box-shadow: 0 14px 28px rgba(255, 107, 0, 0.35);
            color: white;
        }
        
        /* Input field styling - smooth and modern (doesn't break original) */
        .card input {
            border-radius: 3rem !important;
            padding: 0.85rem 1.2rem !important;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        
        .card input:focus {
            border-color: #ff8c2f;
            box-shadow: 0 0 0 3px rgba(255, 140, 47, 0.2);
            outline: none;
        }
        
        /* Card body padding adjustment for more breathing space */
        .card-body {
            padding: 2.2rem !important;
        }
        
        /* responsive fine-tuning */
        @media (max-width: 768px) {
            .image-col, .form-col {
                flex: 0 0 100%;
                max-width: 100%;
            }
            .image-col {
                margin-bottom: 20px;
            }
            .card-body {
                padding: 1.8rem !important;
            }
            .card:hover {
                transform: translateY(-3px);
            }
        }
        
        /* additional touch: add small icon before heading */
        .card-body h2 i {
            font-size: 1.8rem;
            margin-right: 10px;
            background: linear-gradient(135deg, #ff8c2f, #ff6b00);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        
        /* Your original classes remain exactly the same */
        .bg-dark {
            background-color: #212529 !important;
        }
        .min-vh-100 {
            min-height: 100vh;
        }
        .align-items-center {
            align-items: center;
        }
        .justify-content-center {
            justify-content: center;
        }
        .shadow-lg {
            box-shadow: 0 1rem 3rem rgba(0,0,0,.175) !important;
        }
        .border-0 {
            border: 0 !important;
        }
        .rounded-4 {
            border-radius: 1rem !important;
        }
        .p-5 {
            padding: 3rem !important;
        }
        .text-center {
            text-align: center !important;
        }
        .mb-4 {
            margin-bottom: 1.5rem !important;
        }
        .text-muted {
            color: #6c757d !important;
        }
        .w-100 {
            width: 100% !important;
        }
        .mt-4 {
            margin-top: 1.5rem !important;
        }
        .btn {
            display: inline-block;
            font-weight: 400;
            line-height: 1.5;
            text-align: center;
            text-decoration: none;
            vertical-align: middle;
            cursor: pointer;
            transition: color .15s ease-in-out,background-color .15s ease-in-out,border-color .15s ease-in-out,box-shadow .15s ease-in-out;
        }
    </style>
</head>

<body class="bg-dark">

<div class="container">

    <!-- Modified row structure: TWO COLUMNS instead of one - but your original card code is 100% intact inside form-col -->
    <div class="custom-row min-vh-100">
        
        <!-- ========== LEFT SIDE - OFFLINE IMAGE ADDED HERE ========== -->
        <!-- <div class="image-col">
    <video class="reset-image"
           autoplay
           muted
           loop
           playsinline>
        <source src="{% static 'web/video/video23.mp4' %}" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</div> -->
        
        <!-- ========== RIGHT SIDE - YOUR EXACT ORIGINAL CODE (NO CHANGES) ========== -->
        <div class="form-col">
            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-5">

                    <h2 class="text-center mb-4">
                        <i class="fas fa-lock"></i> Reset Password
                    </h2>

                    <p class="text-muted text-center">
                        Enter your email address and we'll send you a password reset link.
                    </p>

                    <form method="POST">

                        {% csrf_token %}

                        {{ form.email }}

                        <button type="submit"
                                class="btn btn-warning w-100 mt-4">
                            <i class="fas fa-paper-plane me-2"></i>Send Reset Link
                        </button>

                    </form>

                </div>

            </div>
        </div>
        <!-- ========== END - YOUR ORIGINAL CODE REMAINS UNCHANGED ========== -->
        
    </div>

</div>

</body>
</html>
