<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Secure payment gateway for MotionHive templates subscription">
    <title>MotionHive | Secure Payment Gateway</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0c15 0%, #0f172a 50%, #0a0c15 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .payment-container {
            width: 100%;
            max-width: 600px;
            margin: 0px auto;
            padding: 5px;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .payment-card {
            background: rgba(30, 43, 60, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 1  0px 12px;
            border: 1px solid rgba(247, 147, 30, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: all 0.3s ease;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #f7931e, #ff6b35);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 2rem;
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(247,147,30,0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(247,147,30,0); }
        }

        .payment-logo h2 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #f7931e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .plan-details {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 24px;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .plan-badge {
            display: inline-block;
            padding: 6px 16px;
            background: linear-gradient(135deg, #f7931e, #ff6b35);
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .plan-name {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            margin-bottom: 10px;
        }

        .plan-price {
            font-size: 2.5rem;
            font-weight: 800;
            color: #f7931e;
            margin-bottom: 15px;
        }

        .plan-price small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #94a3b8;
        }

        .plan-features {
            list-style: none;
            margin-top: 20px;
            text-align: left;
        }

        .plan-features li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            color: #cbd5e1;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .plan-features li i {
            width: 22px;
            color: #10b981;
            font-size: 0.9rem;
        }

        .amount-section {
            background: rgba(247, 147, 30, 0.1);
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(247,147,30,0.2);
        }

        .amount-label {
            font-weight: 600;
            color: #cbd5e1;
        }

        .amount-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #f7931e;
        }

        .pay-btn {
            width: 100%;
            background: linear-gradient(135deg, #f7931e, #ff6b35);
            border: none;
            padding: 16px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .pay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(247,147,30,0.4);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            flex-direction: column;
            gap: 20px;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(247,147,30,0.2);
            border-top: 4px solid #f7931e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .plan-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .plan-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            text-decoration: none;
            border-radius: 60px;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .plan-btn.active {
            background: linear-gradient(135deg, #f7931e, #ff6b35);
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(247,147,30,0.3);
        }

        .plan-btn:hover {
            background: rgba(247,147,30,0.2);
            transform: translateY(-2px);
        }

        .secure-badge {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #94a3b8;
        }

        .secure-badge i {
            margin-right: 6px;
            color: #10b981;

    background:#333;
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:20px;
}

.back-btn:hover{
    background:#555;

        @media (max-width: 550px) {
            .payment-card {

            .plan-price {

        <div class="secure-badge">

    // Get current plan from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    let currentPlanKey = urlParams.get('plan');
    
    // If no plan in URL or invalid, default to monthly
    if (!currentPlanKey || !planConfig[currentPlanKey]) {
        currentPlanKey = "monthly";
    }
    
    // Django template fallback (for server-side rendering)
    const djangoPlan = "{{ plan|default:'' }}";
    if (djangoPlan && djangoPlan !== '' && djangoPlan !== '{{ plan }}' && planConfig[djangoPlan]) {
        currentPlanKey = djangoPlan;
    }
    
    let currentPlan = planConfig[currentPlanKey];
    
    // Function to render plan details dynamically
    function renderPlanDetails(planKey) {
        const plan = planConfig[planKey];
        if (!plan) return;
        
        const container = document.getElementById('planDetailsContainer');
        if (!container) return;
        
        // Build features HTML
        let featuresHtml = '';
        plan.features.forEach(feature => {
            featuresHtml += `
                <li>
                    <i class="fas fa-check-circle"></i>
                    ${feature}
                </li>
            `;
        });
        
        // Build extra text HTML if exists
        let extraHtml = '';
        if (plan.extraText) {
            extraHtml = `<div style="font-size: 0.8rem; color: #10b981; margin-bottom: 15px;">${plan.extraText}</div>`;
        }
        
        const html = `
            <div class="plan-badge">${plan.badge}</div>
            <div class="plan-name">${plan.name}</div>
            <div class="plan-price">${plan.amount_display} <small>${planKey === 'lifetime' ? '/ one-time' : (planKey === 'yearly' ? '/ year' : '/ month')}</small></div>
            ${extraHtml}
            <ul class="plan-features">
                ${featuresHtml}
            </ul>
        `;
        
        container.innerHTML = html;
        
        // Update total amount display
        const amountDisplayElem = document.getElementById('totalAmount');
        if (amountDisplayElem) {
            amountDisplayElem.textContent = plan.amount_display;
        }
        
        // Update active state on plan buttons
        document.querySelectorAll('.plan-btn').forEach(btn => {
            if (btn.getAttribute('data-plan') === planKey) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        // Update URL without reloading (pushState)
        const newUrl = new URL(window.location.href);
        newUrl.searchParams.set('plan', planKey);
        window.history.pushState({ plan: planKey }, '', newUrl);
    }
    
    // Plan switching functionality
   function switchPlan(planKey) {

}

    // Event listeners
    document.addEventListener('DOMContentLoaded', function() {
        // Initial render
        renderPlanDetails(currentPlanKey);
        
        // Plan selector buttons
        const planBtns = document.querySelectorAll('.plan-btn');
        planBtns.forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const planKey = this.getAttribute('data-plan');
                if (planKey && planConfig[planKey]) {
                    switchPlan(planKey);
                }
            });
        });
        
        // Pay button click handler
    
        
        // Handle browser back/forward navigation for plan changes
        window.addEventListener('popstate', function(event) {
            const params = new URLSearchParams(window.location.search);
            const planFromUrl = params.get('plan');
            if (planFromUrl && planConfig[planFromUrl]) {
